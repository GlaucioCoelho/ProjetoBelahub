version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: belahub-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: belahub
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    image: node:18-alpine
    container_name: belahub-backend
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      MONGODB_URI: mongodb://mongodb:27017/belahub
      JWT_SECRET: dev_secret_change_in_production_min_32_chars_here
      JWT_EXPIRE: 7d
      PORT: "5000"
      NODE_ENV: development
      API_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLIC_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: noreply@belahub.com
      MAX_FILE_SIZE: "5242880"
      UPLOAD_PATH: ./uploads
      LOG_LEVEL: debug
    command: sh -c "npm install && npm run dev"
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: node:18-alpine
    container_name: belahub-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      # Required for hot-reload inside Docker containers
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm start"
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_node_modules:
  frontend_node_modules:
