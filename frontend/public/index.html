<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BelaHub" />
    <meta
      name="description"
      content="BelaHub - Sistema SaaS completo para gestão de salões de beleza"
    />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo-belahub.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <title>BelaHub - Gestão de Salão</title>
  </head>
  <body>
    <noscript>Você precisa ativar o JavaScript para usar este aplicativo.</noscript>
    <div id="root"></div>
    <script>
      // Registrar Service Worker para PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
            .then((registration) => {
              console.log('✅ Service Worker registrado com sucesso:', registration);
            })
            .catch((error) => {
              console.log('❌ Erro ao registrar Service Worker:', error);
            });
        });
      }

      // Mostrar prompt de instalação quando disponível
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('💾 App pode ser instalada');
      });
    </script>
  </body>
</html>
